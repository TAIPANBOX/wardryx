"16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">allow</text><text x="844" y="206" font-size="10" fill="#3fb950" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">FORWARD TO LLM / TOOL</text><line x1="844" y1="220" x2="1200" y2="220" stroke="#222b38" stroke-width="1"/><rect x="820" y="252" width="400" height="76" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="820" y="252" width="6" height="76" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="844" y="282" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">deny</text><text x="844" y="302" font-size="10" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">HTTP 403</text><line x1="844" y1="316" x2="1200" y2="316" stroke="#222b38" stroke-width="1"/><rect x="820" y="348" width="400" height="76" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="820" y="348" width="6" height="76" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="844" y="378" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">hold</text><text x="844" y="398" font-size="10" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">HTTP 403 + approval_id</text><line x1="844" y1="412" x2="1200" y2="412" stroke="#222b38" stroke-width="1"/><path d="M 670 300 C 745.0 300, 745.0 194, 814 194" fill="none" stroke="#3fb950" stroke-wi