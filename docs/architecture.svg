</defs><rect x="0" y="0" width="1280" height="720" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="720" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="698" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/wardryx</text><text x="40" y="56" font-size="34" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">wardryx</text><text x="188" y="56" font-size="22" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">- Policy Decision Point</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Agent → TokenFuse (PEP) → POST /v1/decide → Wardryx decides allow / deny / hold; a hold resolves out-of-band via a signed approval token.</text><line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/><text x="42" y="122" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">01 · CALLER</text><text x="322" y="122" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">02 · POLICY DECISION POINT</text><text x="802" y="122" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">03 · OUTCOME</text><rect x="40" y="134" width="260" height="302" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><rect x="320" y="134" width="440" height="302" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><rect x="800" y="134" width="440" height="302" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><rect x="58" y="156" width="224" height="85" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="58" y="156" width="6" height="85" rx="3" ry="3" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="82" y="186" font-size="15" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">AI agent</text><line x1="82" y1="200" x2="262" y2="200" stroke="#222b38" stroke-width="1"/><text x="82" y="224" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">any framework, any tool call</text><line x1="170" y1="241" x2="170" y2="259" stroke="#4493f8" stroke-width="2" opacity="1"/><path d="M 170.0 259.0 L 166.5 250.7 M 170.0 259.0 L 173.5 250.7" fill="none" stroke="#4493f8" stroke-width="2" stroke-linecap="round" opacity="1"/><rect x="58" y="261" width="224" height="150" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="58" y="261" width="6" height="150" rx="3" ry="3" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="82" y="291" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">TokenFuse</text><text x="82" y="311" font-size="10" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">PEP · ENFORCEMENT POINT</text><line x1="82" y1="325" x2="262" y2="325" stroke="#222b38" stroke-width="1"/><text x="82" y="349" font-size="12.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">spend + enforcement proxy</text><text x="82" y="369" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">calls /v1/decide per request</text><text x="82" y="386" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">before every LLM / tool call</text><polygon points="562.5,188.0 540.0,201.0 517.5,188.0 517.5,162.0 540.0,149.0 562.5,162.0" fill="#1a212c" stroke="#4493f8" stroke-width="1.8" filter="soft"/><text x="540" y="167" font-size="12" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle">agent-event</text><text x="540" y="183" font-size="12" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle">bus</text><text x="540" y="213" font-size="9.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="middle">policy_allow · policy_deny · approval_*</text><line x1="540" y1="217" x2="540" y2="259" stroke="#4493f8" stroke-width="2.4" opacity="0.85"/><path d="M 540.0 259.0 L 536.5 250.7 M 540.0 259.0 L 543.5 250.7" fill="none" stroke="#4493f8" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/><text x="562" y="240" font-size="9.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">events</text><rect x="410.0" y="261.0" width="260" height="150" rx="16" ry="16" fill="#1a212c" stroke="#2dd4bf" stroke-width="1.8" filter="glow"/><text x="540" y="322" font-size="22" fill="#2dd4bf" font-family="'SF 