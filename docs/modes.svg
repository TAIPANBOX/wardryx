<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="720" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="720" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="698" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/wardryx</text><text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Enforcement modes</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">How the caller treats a Wardryx decision, and what happens if the PDP itself is unreachable.</text><line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/><text x="42" y="128" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">MODE THE CALLER CHOOSES</text><rect x="40" y="150" width="380" height="300" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="40" y="150" width="6" height="300" rx="3" ry="3" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="70" y="192" font-size="22" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">off</text><text x="70" y="214" font-size="10.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">BYPASS</text><line x1="70" y1="230" x2="396" y2="230" stroke="#222b38" stroke-width="1"/><text x="70" y="256" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">/v1/decide is never called;</text><text x="70" y="278" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">every action proceeds unchecked.</text><line x1="70" y1="302" x2="396" y2="302" stroke="#222b38" stroke-width="1"/><text x="70" y="326" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">use: local dev, a policy-free environment,</text><text x="70" y="344" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">or a service with no loaded policy.</text><rect x="450" y="150" width="380" height="300" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="450" y="150" width="6" height="300" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="480" y="192" font-size="22" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">shadow</text><text x="480" y="214" font-size="10.5" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">DECIDE + LOG, NEVER BLOCK</text><line x1="480" y1="230" x2="806" y2="230" stroke="#222b38" stroke-width="1"/><text x="480" y="256" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">decide runs on every call and</text><text x="480" y="278" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">the result is recorded, but the</text><text x="480" y="300" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">action always proceeds.</text><line x1="480" y1="324" x2="806" y2="324" stroke="#222b38" stroke-width="1"/><text x="480" y="348" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">use: validate a new policy set against real</text><text x="480" y="366" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">traffic before it can ever block anything.</text><rect x="860" y="150" width="380" height="300" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="860" y="150" width="6" height="300" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/><text x="890" y="192" font-size="22" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">enforce</text><text x="890" y="214" font-size="10.5" fill="#3fb950" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">BLOCK ON DENY / HOLD</text><line x1="890" y1="230" x2="1216" y2="230" stroke="#222b38" stroke-width="1"/><text x="890" y="256" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">a deny stops the call outright;</text><text x="890" y="278" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">a hold pauses it until a signed</text><text x="890" y="300" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">approval_token is presented.</text><line x1="890" y1="324" x2="1216" y2="324" stroke="#222b38" stroke-width="1"/><text x="890" y="348" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">use: production; the PDP&#x27;s decision is</text><text x="890" y="366" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">binding.</text><text x="42" y="472" font-size="12" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">IF THE PDP IS UNREACHABLE</text><rect x="40" y="484" width="1200" height="170" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><rect x="64" y="506" width="560" height="130" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="64" y="506" width="6" height="130" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="88" y="536" font-size="15" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">fail-open</text><text x="88" y="556" font-size="10" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">RISK: SILENT BYPASS</text><line x1="88" y1="570" x2="604" y2="570" stroke="#222b38" stroke-width="1"/><text x="88" y="594" font-size="12.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">unreachable Wardryx is treated as &quot;allow&quot;</text><text x="88" y="614" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">availability wins; a PDP outage silently</text><text x="88" y="631" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">disables policy enforcement</text><rect x="656" y="506" width="560" height="130" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="656" y="506" width="6" height="130" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/><text x="680" y="536" font-size="15" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">fail-closed</text><text x="680" y="556" font-size="10" fill="#3fb950" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">RISK: AVAILABILITY LOSS</text><line x1="680" y1="570" x2="1196" y2="570" stroke="#222b38" stroke-width="1"/><text x="680" y="594" font-size="12.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">unreachable Wardryx is treated as &quot;deny&quot;</text><text x="680" y="614" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">policy wins; a PDP outage blocks every</text><text x="680" y="631" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">governed action until it recovers</text><text x="640" y="648" font-size="11" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" text-anchor="middle">the choice is made by whatever calls /v1/decide (TokenFuse); Wardryx itself has no opinion once it cannot be reached</text><text x="42" y="674" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">APPROVAL TOKENS</text><text x="185" y="674" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" text-anchor="start">reusable for the full TTL by default (10 min); <tspan fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace">WARDRYX_APPROVAL_SINGLE_USE=true</tspan> makes each granted token redeem exactly once</text></svg>