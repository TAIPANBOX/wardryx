<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="720" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="720" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="698" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/wardryx</text><text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Decision engine</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Every POST /v1/decide request resolves, deterministically, to exactly one of three outcomes.</text><line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/><rect x="40" y="180" width="270" height="380" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><text x="62" y="216" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">POST /v1/decide</text><line x1="62" y1="230" x2="286" y2="230" stroke="#222b38" stroke-width="1"/><text x="62" y="256" font-size="11.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">&quot;agent_id&quot;</text><text x="62" y="271" font-size="11" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">  &quot;agent://acme.../bot1&quot;</text><text x="62" y="288" font-size="11.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">&quot;tool_names&quot;</text><text x="62" y="303" font-size="11" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">  [&quot;send_wire_transfer&quot;]</text><text x="62" y="320" font-size="11.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">&quot;domains&quot;</text><text x="62" y="335" font-size="11" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">  [&quot;payments.acme...&quot;]</text><text x="62" y="352" font-size="11.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">&quot;steps&quot;</text><text x="62" y="367" font-size="11" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">  3</text><text x="62" y="384" font-size="11.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">&quot;est_cost_usd&quot;</text><text x="62" y="399" font-size="11" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">  1200.00</text><text x="62" y="416" font-size="11.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">&quot;attestation_method&quot;</text><text x="62" y="431" font-size="11" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">  &quot;spiffe-svid&quot;</text><text x="62" y="448" font-size="11.5" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">&quot;approval_token&quot;</text><text x="62" y="463" font-size="11" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">  &quot;&quot;</text><line x1="62" y1="484" x2="286" y2="484" stroke="#222b38" stroke-width="1"/><text x="165" y="508" font-size="11" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" text-anchor="middle">matched against loaded policies</text><rect x="360.0" y="310.0" width="190" height="120" rx="16" ry="16" fill="#1a212c" stroke="#2dd4bf" stroke-width="1.8" filter="glow"/><text x="455" y="356" font-size="19" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">wardryx</text><text x="455" y="378" font-size="13.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Engine.Decide</text><text x="455" y="398" font-size="10.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="middle">pure fn(policy set, request)</text><line x1="310" y1="370" x2="358" y2="370" stroke="#2dd4bf" stroke-width="2.2" opacity="1"/><path d="M 358.0 370.0 L 349.7 373.5 M 358.0 370.0 L 349.7 366.5" fill="none" stroke="#2dd4bf" stroke-width="2.2" stroke-linecap="round" opacity="1"/><rect x="560" y="150" width="680" height="150" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="560" y="150" width="6" height="150" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/><circle cx="594" cy="184" r="13" fill="none" stroke="#3fb950" stroke-width="2"/><circle cx="594" cy="184" r="4" fill="#3fb950"/><text x="618" y="182" font-size="19" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">allow</text><text x="618" y="204" font-size="10" fill="#3fb950" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">DECISION · ALLOW</text><line x1="584" y1="218" x2="1216" y2="218" stroke="#222b38" stroke-width="1"/><text x="584" y="240" font-size="11.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">trigger: no matched rule denied, and est_cost_usd stays under any require_human_above_usd</text><text x="584" y="260" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">wire: no HTTP error; TokenFuse passes the call straight through to the LLM / tool</text><text x="584" y="280" font-size="11.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">response: decision:&quot;allow&quot;; cacheable:true unless a matched policy sets a per-request limit</text><path d="M 500 370 C 530.0 370, 530.0 225, 554 225" fill="none" stroke="#3fb950" stroke-width="1.8" opacity="0.6"/><path d="M 560 225 l -9 -5 l 0 10 z" fill="#3fb950" opacity="0.8"/><rect x="560" y="320" width="680" height="150" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="560" y="320" width="6" height="150" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><circle cx="594" cy="354" r="13" fill="none" stroke="#ff6b63" stroke-width="2"/><circle cx="594" cy="354" r="4" fill="#ff6b63"/><text x="618" y="352" font-size="19" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">deny</text><text x="618" y="374" font-size="10" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">DECISION · DENY</text><line x1="584" y1="388" x2="1216" y2="388" stroke="#222b38" stroke-width="1"/><text x="584" y="410" font-size="11.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">trigger: deny_tool, deny_if_unattested, max_steps exhausted, or a domain outside allow_domains</text><text x="584" y="430" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">wire: HTTP 403 Forbidden; TokenFuse returns the block straight to the calling agent</text><text x="584" y="450" font-size="11.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">response: decision:&quot;deny&quot;; reason names the exact rule; approval_token_required:false</text><path d="M 500 370 C 530.0 370, 530.0 395, 554 395" fill="none" stroke="#ff6b63" stroke-width="1.8" opacity="0.6"/><path d="M 560 395 l -9 -5 l 0 10 z" fill="#ff6b63" opacity="0.8"/><rect x="560" y="490" width="680" height="150" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="560" y="490" width="6" height="150" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><circle cx="594" cy="524" r="13" fill="none" stroke="#e3b341" stroke-width="2"/><circle cx="594" cy="524" r="4" fill="#e3b341"/><text x="618" y="522" font-size="19" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">hold</text><text x="618" y="544" font-size="10" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">DECISION · HOLD</text><line x1="584" y1="558" x2="1216" y2="558" stroke="#222b38" stroke-width="1"/><text x="584" y="580" font-size="11.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">trigger: est_cost_usd exceeds a matched require_human_above_usd, with no valid approval_token presented</text><text x="584" y="600" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">wire: HTTP 403 Forbidden; stateless, nothing blocks waiting on a human</text><text x="584" y="620" font-size="11.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">response: approval_id issued; resubmit the same call with header x-fuse-approval-token to redeem the grant</text><path d="M 500 370 C 530.0 370, 530.0 565, 554 565" fill="none" stroke="#e3b341" stroke-width="1.8" opacity="0.6"/><path d="M 560 565 l -9 -5 l 0 10 z" fill="#e3b341" opacity="0.8"/></svg>